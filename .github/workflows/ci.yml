name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Toolchain versions
        run: |
          clang++ --version
          make --version | head -1

      - name: Build the compiler
        run: make

      - name: Smoke — parse the examples
        run: make run

      # Emit IR, link the C runtime, run the result — on both platforms.
      - name: Native backend smoke (build + run hello)
        run: |
          ./build/beansc build examples/hello.b -o hello_smoke
          out=$(./hello_smoke)
          echo "native output: $out"
          test "$out" = "hello from beans"

      # The full interpreter-vs-native differential suite runs on Linux. It is not
      # run on the macOS CI runners: the Apple-Silicon (Sequoia) runner fails the
      # interpreter's dlopen-inserted extern-"C" bridge dylib (arm64 vs arm64e),
      # the Sonoma runner's toolchain fails to build the compiler, and the Intel
      # runner is being retired and queues for a long time. macOS is covered by
      # the build + native smoke above, and by the full suite in local dev.
      - name: Differential test suite (Linux)
        if: runner.os == 'Linux'
        run: make test
